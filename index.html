<!DOCTYPE html>
<html>
    <head>
        <title>Slot Machine</title>
        <style>@import url('https://fonts.googleapis.com/css2?family=Federo&display=swap');</style>
        <link rel="stylesheet" href="./styles.css">
        <script src="./script.js"></script>
    </head>
    <body>
        <h1>Slot Machine</h1>
        <table id="machine">
            <tr>
                <td id="0,0">💰</td>
                <td id="1,0">💰</td>
                <td id="2,0">💰</td>
            </tr>
            <tr>
                <td id="0,1">💎</td>
                <td id="1,1">💎</td>
                <td id="2,1">💎</td>
            </tr>
            <tr>
                <td id="0,2">🍀</td>
                <td id="1,2">🍀</td>
                <td id="2,2">🍀</td>
            </tr>
        </table>
        <button id="spin-button"></button>
    </body>
</html>
