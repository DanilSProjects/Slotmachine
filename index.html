<!DOCTYPE html>
<html>
    <head>
        <title>Slot Machine</title>
        <style>@import url('https://fonts.googleapis.com/css2?family=Federo&display=swap');</style>
        <link rel="stylesheet" href="./styles.css">
        <script src="./script.js"></script>
    </head>
    <body>
        <h1>Slot Machine</h1>
        <p>Balance: $<span id="balance">200</span></p>
        <p>Each spin is currently $10.</p>
        <table id="machine">
            <tr>
                <td id="0,0">💰</td>
                <td id="1,0">💰</td>
                <td id="2,0">💰</td>
            </tr>
            <tr>
                <td id="0,1">💎</td>
                <td id="1,1">💎</td>
                <td id="2,1">💎</td>
            </tr>
            <tr>
                <td id="0,2">🍀</td>
                <td id="1,2">🍀</td>
                <td id="2,2">🍀</td>
            </tr>
        </table>
        <button id="spin-button"></button>
        <hr>
        <div id="payout-legend">
            <h1>Payout Table</h1>
            <p>Payout scales with your current bet.</p>
            <table>
                <tr>
                    <td>🍒🍒🍒</td>
                    <td>20</td>
                </tr>
                <tr>
                    <td>🍋🍋🍋</td>
                    <td>30</td>
                </tr>
                <tr>
                    <td>🍉🍉🍉</td>
                    <td>40</td>
                </tr>
                <tr>
                    <td>💰💰💰</td>
                    <td>50</td>
                </tr>
                <tr>
                    <td>🍀🍀🍀</td>
                    <td>100</td>
                </tr>
                <tr>
                    <td>💎💎💎</td>
                    <td>200</td>
                </tr>
            </table>
        </div>
    </body>
</html>
