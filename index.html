<!DOCTYPE html>
<html>
    <head>
        <title>Slot Machine</title>
        <link rel="stylesheet" href="./styles.css">
        <script src="./script.js"></script>
    </head>
    <body>
        <h1>Slot Machine</h1>
        <table id="machine">
            <tr>
                <td id="0,0">X</td>
                <td id="1,0">X</td>
                <td id="2,0">X</td>
            </tr>
            <tr>
                <td id="0,1">Y</td>
                <td id="1,1">Y</td>
                <td id="2,1">Y</td>
            </tr>
            <tr>
                <td id="0,2">Z</td>
                <td id="1,2">Z</td>
                <td id="2,2">Z</td>
            </tr>
        </table>
        <button id="spin-button"></button>
    </body>
</html>
